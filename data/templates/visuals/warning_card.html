<!doctype html>
<html dir="ltr" lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    width:1440px; height:3088px;
    background:#0b0e11; color:#eaecef;
    font-family:'Inter','SF Pro Display','Segoe UI', Arial, sans-serif;
  }
  .wrap { padding:120px 100px; height:100%;
          background: radial-gradient(1600px 1100px at 50% 25%, rgba(246,70,93,0.15), transparent 60%), #0b0e11;
          display:flex; flex-direction:column; }
  .brand { color:#F0B90B; font-size:48px; font-weight:800; letter-spacing:1px; }
  .alert {
    margin-top:80px;
    display:inline-flex; align-items:center; gap:24px;
    background:rgba(246,70,93,0.16); color:#F6465D;
    padding:24px 40px; border-radius:999px;
    font-size:48px; font-weight:700; align-self:flex-start;
  }
  .pair { margin-top:80px; font-size:200px; font-weight:800; letter-spacing:-3px; }
  .quote { color:#848e9c; font-size:64px; margin-top:8px; }

  .big-pct {
    margin-top:120px;
    font-size:340px; font-weight:800; color:#F6465D; letter-spacing:-6px; line-height:0.95;
  }
  .label { color:#848e9c; font-size:60px; margin-top:30px; }

  .grid { margin-top:160px; display:grid; grid-template-columns:1fr 1fr; gap:50px; }
  .cell {
    background: rgba(30,35,41,0.7); border:1px solid rgba(246,70,93,0.18);
    border-radius:24px; padding:50px 56px;
  }
  .cell .k { color:#848e9c; font-size:44px; }
  .cell .v { font-size:80px; font-weight:700; margin-top:14px; }

  .footer { margin-top:auto; display:flex; justify-content:space-between;
            color:#5a6470; font-size:40px; padding-top:60px; }
  .handle { color:#F0B90B; font-weight:700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">BINANCE • Alert</div>
  <div class="alert">⚠ {{ALERT_TEXT}}</div>
  <div class="pair">{{SYMBOL}}</div>
  <div class="quote">{{SYMBOL}}/USDT</div>

  <div class="big-pct">{{CHANGE_SIGN}}{{CHANGE_PCT}}%</div>
  <div class="label">تغير في {{PERIOD}}</div>

  <div class="grid">
    <div class="cell"><div class="k">السعر الحالي</div><div class="v">${{PRICE}}</div></div>
    <div class="cell"><div class="k">قاع 24h</div><div class="v">${{LOW_24H}}</div></div>
    <div class="cell"><div class="k">قمة 24h</div><div class="v">${{HIGH_24H}}</div></div>
    <div class="cell"><div class="k">الحجم</div><div class="v">{{VOL_24H}}</div></div>
  </div>

  <div class="footer">
    <div class="handle">@{{HANDLE}}</div>
    <div>{{TIMESTAMP}}</div>
  </div>
</div>
</body>
</html>
